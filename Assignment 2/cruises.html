<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel Deals - Cruises</title>
  <link rel="stylesheet" href="mystyle.css">
  <script src="script.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>

  <div class="header">
    <h1>Travel Deals</h1>
    <div id="datetime"></div>
  </div>

  <div class="navbar">
    <a href="stays.html">Stays</a>
    <a href="cars.html">Cars</a>
    <a href="cruises.html">Cruises</a>
    <a href="book.html">Book</a>
    <a href="contact-us.html">Contact Us</a>
  </div>

  <div class="container">
    <div class="side">
      <h3>Settings</h3>
      <label>Font size</label>
      <select id="fontSizeSelect" onchange="changeFontSize(this.value)">
        <option value="16">Normal</option>
        <option value="14">Small</option>
        <option value="20">Large</option>
        <option value="24">Extra Large</option>
      </select>

      <label>Background color</label>
      <select id="bgColorSelect" onchange="changeBgColor(this.value)">
        <option value="#ffffff">White</option>
        <option value="#f0f8ff">Light Blue</option>
        <option value="#fff8e7">Cream</option>
        <option value="#eaffea">Light Green</option>
      </select>
    </div>

    <div class="main">
      <h2>Find a Cruise</h2>

      <label>Destination</label>
      <select id="destination">
        <option value="">-- Select --</option>
        <option value="Alaska">Alaska</option>
        <option value="Bahamas">Bahamas</option>
        <option value="Europe">Europe</option>
        <option value="Mexico">Mexico</option>
      </select>

      <label>Departing between</label>
      <input type="date" id="departing">

      <label>Minimum duration (days)</label>
      <input type="number" id="minDuration" value="3" min="0">

      <label>Maximum duration (days)</label>
      <input type="number" id="maxDuration" value="10" min="0">

      <label>Adults</label>
      <input type="number" id="adults" value="0" min="0">

      <label>Children</label>
      <input type="number" id="children" value="0" min="0">

      <label>Infants</label>
      <input type="number" id="infants" value="0" min="0">

      <button id="submitBtn">Submit</button>

      <div class="result" id="result"></div>
    </div>
  </div>

  <div class="footer">
    &copy; Roshini Lidwin & Tipper Truong - CS 4339.0W1 Assignment #2
  </div>

  <script>
    // This page uses jQuery methods
    $(document).ready(function () {

      function isDateInRange(dateStr) {
        if (!dateStr) return false;
        var d = new Date(dateStr);
        var start = new Date("2024-09-01");
        var end = new Date("2024-12-01");
        return d >= start && d <= end;
      }

      $("#submitBtn").click(function () {
        var destination = $("#destination").val();
        var departing = $("#departing").val();
        var minD = parseInt($("#minDuration").val()) || 0;
        var maxD = parseInt($("#maxDuration").val()) || 0;
        var adults = parseInt($("#adults").val()) || 0;
        var children = parseInt($("#children").val()) || 0;
        var infants = parseInt($("#infants").val()) || 0;

        if (destination === "") {
          alert("Destination must be Alaska, Bahamas, Europe, or Mexico.");
          return;
        }
        if (minD < 3) {
          alert("Minimum duration cannot be less than 3 days.");
          return;
        }
        if (maxD > 10) {
          alert("Maximum duration cannot be greater than 10 days.");
          return;
        }
        if (minD > maxD) {
          alert("Minimum duration cannot be greater than maximum duration.");
          return;
        }
        if (!isDateInRange(departing)) {
          alert("Departing date must be between Sep 1, 2024 and Dec 1, 2024.");
          return;
        }

        // Guests: max 2 per room, infants can stay with adults
        var counted = adults + children;
        if (counted === 0 && infants === 0) {
          alert("Please enter at least one guest.");
          return;
        }
        var rooms = Math.ceil(counted / 2);
        if (rooms < 1) rooms = 1;

        $("#result").html(
          "<strong>Your Cruise Search</strong><br>" +
          "Destination: " + destination + "<br>" +
          "Departing between: " + departing + "<br>" +
          "Duration: " + minD + " to " + maxD + " days<br>" +
          "Adults: " + adults + ", Children: " + children + ", Infants: " + infants + "<br>" +
          "Rooms needed: " + rooms
        ).show();
      });
    });
  </script>

</body>
</html>
