<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel Deals - Stays</title>
  <link rel="stylesheet" href="mystyle.css">
  <script src="script.js"></script>
</head>
<body>

  <div class="header">
    <h1>Travel Deals</h1>
    <div id="datetime"></div>
  </div>

  <div class="navbar">
    <a href="stays.html">Stays</a>
    <a href="cars.html">Cars</a>
    <a href="cruises.html">Cruises</a>
    <a href="book.html">Book</a>
    <a href="contact-us.html">Contact Us</a>
  </div>

  <div class="container">
    <div class="side">
      <h3>Settings</h3>
      <label>Font size</label>
      <select id="fontSizeSelect" onchange="changeFontSize(this.value)">
        <option value="16">Normal</option>
        <option value="14">Small</option>
        <option value="20">Large</option>
        <option value="24">Extra Large</option>
      </select>

      <label>Background color</label>
      <select id="bgColorSelect" onchange="changeBgColor(this.value)">
        <option value="#ffffff">White</option>
        <option value="#f0f8ff">Light Blue</option>
        <option value="#fff8e7">Cream</option>
        <option value="#eaffea">Light Green</option>
      </select>
    </div>

    <div class="main">
      <h2>Find a Stay</h2>

      <label>City</label>
      <input type="text" id="city" placeholder="e.g. Dallas">

      <label>Check-in date</label>
      <input type="date" id="checkin">

      <label>Check-out date</label>
      <input type="date" id="checkout">

      <label>Adults</label>
      <input type="number" id="adults" value="0" min="0">

      <label>Children</label>
      <input type="number" id="children" value="0" min="0">

      <label>Infants</label>
      <input type="number" id="infants" value="0" min="0">

      <button onclick="searchStays()">Search</button>

      <div class="result" id="result"></div>
    </div>
  </div>

  <div class="footer">
    &copy; Roshini Lidwin & Tipper Truong - CS 4339.0W1 Assignment #2
  </div>

  <script>
    // Allowed cities in Texas or California
    var allowedCities = [
      "houston", "san antonio", "dallas", "austin", "fort worth", "el paso",
      "arlington", "plano", "irving",
      "los angeles", "san diego", "san jose", "san francisco",
      "fresno", "sacramento", "long beach", "oakland"
    ];

    function isCityValid(c) {
      return allowedCities.indexOf(c.trim().toLowerCase()) !== -1;
    }

    function isDateInRange(dateStr) {
      if (!dateStr) return false;
      return dateStr >= "2024-09-01" && dateStr <= "2024-12-01";
    }

    function searchStays() {
      var city = document.getElementById("city").value;
      var checkin = document.getElementById("checkin").value;
      var checkout = document.getElementById("checkout").value;
      var adults = parseInt(document.getElementById("adults").value) || 0;
      var children = parseInt(document.getElementById("children").value) || 0;
      var infants = parseInt(document.getElementById("infants").value) || 0;

      // Validation (no regular expressions per instructions)
      if (city.trim() === "") {
        alert("Please enter a city.");
        return;
      }
      if (!isCityValid(city)) {
        alert("City must be a city in Texas or California.");
        return;
      }
      if (!isDateInRange(checkin) || !isDateInRange(checkout)) {
        alert("Check-in and check-out dates must be between Sep 1, 2024 and Dec 1, 2024.");
        return;
      }
      if (new Date(checkout) <= new Date(checkin)) {
        alert("Check-out date must be after check-in date.");
        return;
      }
      if (adults + children + infants === 0) {
        alert("Please enter at least one guest.");
        return;
      }

      // Rooms: max 2 guests per room, but infants can stay with adults
      var countedGuests = adults + children;
      var rooms = Math.ceil(countedGuests / 2);
      if (rooms < 1) rooms = 1;

      var out = document.getElementById("result");
      out.style.display = "block";
      out.innerHTML =
        "<strong>Your Search</strong><br>" +
        "City: " + city + "<br>" +
        "Check-in: " + checkin + "<br>" +
        "Check-out: " + checkout + "<br>" +
        "Adults: " + adults + ", Children: " + children + ", Infants: " + infants + "<br>" +
        "Rooms needed: " + rooms;
    }
  </script>

</body>
</html>
