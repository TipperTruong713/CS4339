<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel Deals - Book/Flights</title>
  <link rel="stylesheet" href="mystyle.css">
  <script src="script.js"></script>
</head>
<body>

  <div class="header">
    <h1>Travel Deals</h1>
    <div id="datetime"></div>
  </div>

  <div class="navbar">
    <a href="stays.html">Stays</a>
    <a href="cars.html">Cars</a>
    <a href="cruises.html">Cruises</a>
    <a href="book-flight.html">Book</a>
    <a href="contact-us.html">Contact Us</a>
  </div>

  <div class="container">
    <div class="side">
      <h3>Settings</h3>
      <label>Font size</label>
      <select id="fontSizeSelect" onchange="changeFontSize(this.value)">
        <option value="16">Normal</option>
        <option value="14">Small</option>
        <option value="20">Large</option>
        <option value="24">Extra Large</option>
      </select>

      <label>Background color</label>
      <select id="bgColorSelect" onchange="changeBgColor(this.value)">
        <option value="#ffffff">White</option>
        <option value="#f0f8ff">Light Blue</option>
        <option value="#fff8e7">Cream</option>
        <option value="#eaffea">Light Green</option>
      </select>
    </div>

    <div class="main">
      <h2>Book Travel</h2>

      <label>Trip type</label>
      <div class="radio-line">
        <input type="radio" name="trip" value="One Way" onclick="showTripFields()"> <label>One Way</label>
        <input type="radio" name="trip" value="Round Trip" onclick="showTripFields()"> <label>Round Trip</label>
      </div>

      <label>Origin</label>
      <input type="text" id="origin" placeholder="City in Texas">

      <label>Destination</label>
      <input type="text" id="destination" placeholder="City in California">

      <label>Departure date</label>
      <input type="date" id="departure">

      <div id="returnBox" style="display:none;">
        <label>Return date</label>
        <input type="date" id="returnDate">
      </div>

      <button type="button" onclick="togglePassengers()">👤 Passengers</button>

      <div class="popup" id="passengerBox">
        <label>Adults</label>
        <input type="number" id="adults" value="0" min="0">

        <label>Children</label>
        <input type="number" id="children" value="0" min="0">

        <label>Infants</label>
        <input type="number" id="infants" value="0" min="0">
      </div>

      <button onclick="searchFlights()">Search</button>

      <div class="result" id="result"></div>
    </div>
  </div>

  <div class="footer">
    &copy; Roshini Lidwin & Tipper Truong - CS 4339.0W1 Assignment #2
  </div>

  <script>
    var cityPattern = /^(Dallas|Austin|Houston|San Antonio|Fort Worth|El Paso|Arlington|Plano|Irving|Los Angeles|San Diego|San Jose|San Francisco|Fresno|Sacramento|Long Beach|Oakland)$/i;
    var datePattern = /^2024-(09|10|11)-[0-3][0-9]$|^2024-12-01$/;
    var passengerPattern = /^[0-4]$/;

    function getTripType() {
      var trips = document.getElementsByName("trip");
      for (var i = 0; i < trips.length; i++) {
        if (trips[i].checked) {
          return trips[i].value;
        }
      }
      return "";
    }

    function showTripFields() {
      var trip = getTripType();
      if (trip === "Round Trip") {
        document.getElementById("returnBox").style.display = "block";
      } else {
        document.getElementById("returnBox").style.display = "none";
      }
    }

    function togglePassengers() {
      var box = document.getElementById("passengerBox");
      if (box.style.display === "block") {
        box.style.display = "none";
      } else {
        box.style.display = "block";
      }
    }

    function isDateInRange(dateStr) {
      if (!datePattern.test(dateStr)) return false;
      return dateStr >= "2024-09-01" && dateStr <= "2024-12-01";
    }

    function searchFlights() {
      var trip = getTripType();
      var origin = document.getElementById("origin").value.trim();
      var destination = document.getElementById("destination").value.trim();
      var departure = document.getElementById("departure").value;
      var returnDate = document.getElementById("returnDate").value;
      var adults = parseInt(document.getElementById("adults").value) || 0;
      var children = parseInt(document.getElementById("children").value) || 0;
      var infants = parseInt(document.getElementById("infants").value) || 0;

      if (trip === "") {
        alert("Please choose one way or round trip.");
        return;
      }

      if (!cityPattern.test(origin)) {
        alert("Origin must be a city in Texas or California.");
        return;
      }

      if (!cityPattern.test(destination)) {
        alert("Destination must be a city in Texas or California.");
        return;
      }

      if (origin.toLowerCase() === destination.toLowerCase()) {
        alert("Origin and destination cannot be the same.");
        return;
      }

      if (!isDateInRange(departure)) {
        alert("Departure date must be between Sep 1, 2024 and Dec 1, 2024.");
        return;
      }

      if (trip === "Round Trip") {
        if (!isDateInRange(returnDate)) {
          alert("Return date must be between Sep 1, 2024 and Dec 1, 2024.");
          return;
        }

        if (new Date(returnDate) <= new Date(departure)) {
          alert("Return date must be after departure date.");
          return;
        }
      }

      if (!passengerPattern.test(String(adults)) || !passengerPattern.test(String(children)) || !passengerPattern.test(String(infants))) {
        alert("Number of passengers for each category cannot be more than 4.");
        return;
      }

      if (adults + children + infants === 0) {
        alert("Please enter at least one passenger.");
        return;
      }

      var output =
        "<strong>Your Flight Search</strong><br>" +
        "Trip type: " + trip + "<br>" +
        "Origin: " + origin + "<br>" +
        "Destination: " + destination + "<br>" +
        "Departure date: " + departure + "<br>";

      if (trip === "Round Trip") {
        output += "Return date: " + returnDate + "<br>";
      }

      output +=
        "Adults: " + adults + "<br>" +
        "Children: " + children + "<br>" +
        "Infants: " + infants;

      document.getElementById("result").style.display = "block";
      document.getElementById("result").innerHTML = output;
    }
  </script>

</body>
</html>
